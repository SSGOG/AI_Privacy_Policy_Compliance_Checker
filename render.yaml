services:
  - type: web
    name: compliance-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r compliance_app/requirements.txt
    startCommand: python main.py
    plan: starter
    envVars:
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: USERS_FILE
        value: ./users.json
      - key: API_PORT
        value: "8000"
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: compliance-frontend
    runtime: static
    rootDir: artifacts/compliance-checker
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
